<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f1f1f1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" media="screen and (max-width: 48em)">
    <link rel="dns-prefetch" href="//assets.hszhe9.com">
    <link rel="preconnect" href="https://assets.hszhe9.com" crossorigin>
    <link rel="dns-prefetch" href="//live.staticflickr.com">
    <link rel="preconnect" href="https://live.staticflickr.com" crossorigin>
    <link rel="shortcut icon" href="{{ site.logo | relative_url }}">
    <link rel="icon" type="image/png" href="{{ site.logo | relative_url }}">
    <link rel="apple-touch-icon" href="{{ site.logo | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <link rel="alternate" type="application/atom+xml" title="{{ site.title | escape }}" href="{{ '/feed.xml' | relative_url }}">
    {% seo %}
  </head>
  <body class="{% if page.url == '/' %}home{% endif %} {% if page.layout == 'post' %}content-focused{% endif %} layout-{{ page.layout | default: 'default' }}">
    <div id="page" class="site">
      <a class="skip-link" href="#content">跳至内容</a>

      <div id="sidebar" class="sidebar">
        <header id="masthead" class="site-header">
          <div class="site-branding">
            <a href="{{ '/' | relative_url }}" class="custom-logo-link" rel="home">
              <img src="{{ site.logo | relative_url }}" class="custom-logo" alt="{{ site.title }}">
            </a>
          </div>

          <nav id="site-navigation" class="main-navigation" aria-label="主导航">
            <ul class="nav-menu">
              <li class="{% if page.url == '/' %}current-menu-item{% endif %}"><a href="{{ '/' | relative_url }}">首页</a></li>
              <li class="{% if page.layout == 'category_archive' %}current-menu-item current-menu-ancestor open{% endif %} menu-item-has-children">
                <a
                  href="#"
                  class="submenu-link"
                  aria-current="{% if page.layout == 'category_archive' %}page{% endif %}"
                  aria-expanded="{% if page.layout == 'category_archive' %}true{% else %}false{% endif %}"
                  aria-controls="category-submenu"
                >分类</a>
                <ul id="category-submenu" class="sub-menu">
                  {% for pair in site.data.categories %}
                    {% assign slug = pair[0] %}
                    {% assign item = pair[1] %}
                    <li class="{% if page.category_slug == slug %}current-menu-item{% endif %}"><a href="{{ item.path | relative_url }}">{{ item.label }}</a></li>
                  {% endfor %}
                </ul>
              </li>
              <li class="{% if page.url == '/about/' %}current-menu-item{% endif %}"><a href="{{ '/about/' | relative_url }}">关于</a></li>
            </ul>
          </nav>
        </header>
      </div>

      <div id="content" class="site-content">
        <div id="primary" class="content-area">
          <main id="main" class="site-main">
            {{ content }}
          </main>
        </div>
      </div>
    </div>
    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
  </body>
</html>
