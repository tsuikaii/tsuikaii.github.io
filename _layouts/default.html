<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f1f1f1">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <link rel="alternate" type="application/atom+xml" title="{{ site.title | escape }}" href="{{ '/feed.xml' | relative_url }}">
    {% seo %}
  </head>
  <body class="{% if page.url == '/' %}home{% endif %} layout-{{ page.layout | default: 'default' }}">
    <div id="page" class="site">
      <a class="skip-link" href="#content">跳至内容</a>

      <div id="sidebar" class="sidebar">
        <header id="masthead" class="site-header">
          <div class="site-branding">
            <a href="{{ '/' | relative_url }}" class="custom-logo-link" rel="home">
              <img src="{{ site.logo | relative_url }}" class="custom-logo" alt="{{ site.title }}">
            </a>
            <h1 class="site-title"><a href="{{ '/' | relative_url }}" rel="home">{{ site.title }}</a></h1>
            <button class="secondary-toggle" type="button" aria-expanded="false" aria-controls="secondary">菜单</button>
          </div>
        </header>

        <div id="secondary" class="secondary">
          <nav id="site-navigation" class="main-navigation" aria-label="主导航">
            <ul class="nav-menu">
              <li class="{% if page.url == '/' %}current-menu-item{% endif %}"><a href="{{ '/' | relative_url }}">首页</a></li>
              <li class="{% if page.layout == 'category_archive' %}current-menu-item current-menu-ancestor open{% endif %} menu-item-has-children">
                <div class="menu-item-row">
                  <a href="#" aria-current="{% if page.layout == 'category_archive' %}page{% endif %}">分类</a>
                  <button class="submenu-toggle" type="button" aria-expanded="{% if page.layout == 'category_archive' %}true{% else %}false{% endif %}">展开分类</button>
                </div>
                <ul class="sub-menu">
                  {% for pair in site.data.categories %}
                    {% assign slug = pair[0] %}
                    {% assign item = pair[1] %}
                    <li class="{% if page.category_slug == slug %}current-menu-item{% endif %}"><a href="{{ item.path | relative_url }}">{{ item.label }}</a></li>
                  {% endfor %}
                </ul>
              </li>
              <li class="{% if page.url == '/article/2022/10/09/welcome-to-tsuikaii/' %}current-menu-item{% endif %}"><a href="{{ '/article/2022/10/09/welcome-to-tsuikaii/' | relative_url }}">关于本站</a></li>
            </ul>
          </nav>
        </div>
      </div>

      <div id="content" class="site-content">
        <div id="primary" class="content-area">
          <main id="main" class="site-main">
            {{ content }}
          </main>
        </div>
      </div>
    </div>
    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
  </body>
</html>
