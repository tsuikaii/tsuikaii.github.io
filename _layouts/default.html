<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#fbfaf6">
    <link rel="preconnect" href="https://gw.alipayobjects.com" crossorigin>
    <link rel="stylesheet" href="https://gw.alipayobjects.com/os/k/font/lxgwwenkaiscreenr.css">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <link rel="alternate" type="application/atom+xml" title="{{ site.title | escape }}" href="{{ '/feed.xml' | relative_url }}">
    {% seo %}
  </head>
  <body class="page-{{ page.layout | default: 'default' }}">
    <div class="page-frame">
      <header class="site-header">
        <nav class="site-nav" aria-label="主导航">
          <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
          <div class="site-links">
            <a href="{{ '/about/' | relative_url }}">About</a>
          </div>
        </nav>
      </header>

      <main class="site-main">
        {{ content }}
      </main>

      <footer class="site-footer">
        <p>{{ site.title }} · {{ site.time | date: "%Y" }} · {{ site.location }}</p>
      </footer>
    </div>
  </body>
</html>
