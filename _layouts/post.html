---
layout: default
---

<article class="entry entry-post">
  <header class="entry-header">
    <p class="entry-date">{{ page.date | date: "%Y-%m-%d" }}</p>
    <h1 class="entry-title">{{ page.title }}</h1>
  </header>

  <div class="entry-content">
    {{ content | replace: '<!--more-->', '' }}
  </div>

  <nav class="entry-nav" aria-label="文章导航">
    <a href="{{ '/' | relative_url }}">返回首页</a>
  </nav>
</article>
